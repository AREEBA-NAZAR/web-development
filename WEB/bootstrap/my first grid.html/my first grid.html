<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha374-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha374-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <style>
        .col {
            border: 1px solid black;
            text-align: center;
        }
    </style>
</head>
<body>

<h3>equal width and height columns and rows</h3>
<div class="container">
    <h1>My Grid Layout</h1>
    <div class="row">
        <div class="col">size</div>
        <div class="col">column2</div>
        <div class="col">column3</div>


    </div>
<div class="row">
    <div class="col-md-12 col-lg-6" style="background-color: rgb(78, 150, 198);">row2 column1</div>
    <div class="col-xs-6 col-md-2 " style="background-color: rgb(255, 193, 7);">row2 column2</div>          
</div>
</body>
</html>

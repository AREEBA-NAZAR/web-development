 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style p.css">
 
</head>
 <body>
    <h2>Positioning and opacity</h2>
    <div>
        div with no position property
    </div>
    <div class="relative">
        div with position relative
    </div>
    <div class="absolute">
        div with position absolute
    </div>
    <div class="fixed">
        div with position fixed
    </div>
    <div class="sticky">
        div with position sticky
    </div>
 </body>
 </html>

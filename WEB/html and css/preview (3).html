<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cascading Image Effect</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .cascade-container {
      position: relative;
      width: 300px; /* change to your image width */
      margin: 50px auto;
    }

    .cascade-container img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      opacity: 0.7;
      transform: translateY(0);
      transition: transform 0.5s, opacity 0.5s;
    }

    /* Cascade layers */
    .cascade-container img:nth-child(2) {
      transform: translateY(20px);
      opacity: 0.6;
      z-index: -1;
    }

    .cascade-container img:nth-child(3) {
      transform: translateY(40px);
      opacity: 0.5;
      z-index: -2;
    }

    .cascade-container img:nth-child(4) {
      transform: translateY(60px);
      opacity: 0.4;
      z-index: -3;
    }
  </style>
</head>
<body>
  <div class="container text-center">
    <h2>Cascading Image Effect</h2>
    <div class="cascade-container">
      <img src="https://via.placeholder.com/300x200" alt="Image 1">
      <img src="https://via.placeholder.com/300x200" alt="Image 2">
      <img src="https://via.placeholder.com/300x200" alt="Image 3">
      <img src="https://via.placeholder.com/300x200" alt="Image 4">
    </div>
  </div>
</body>
</html>

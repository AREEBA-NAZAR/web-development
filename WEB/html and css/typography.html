<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>typography</title><style>
        .text {
            font-size: 16px;
            line-height: 1.5;
            color: #4f2f20;
            text-shadow: 2px 2px 4px #3d471e;
            font-family: 'Papyrus', fantasy;
        }
        .p1 {
            font-size: 18px;
            line-height: 1.6;
            color: #211611;
            font-family:comicsansms, cursive;
        }
        div{
            width: 300px;
            height: 100px;
            background-color: rgb(129, 255, 127);
            border: 3px rgb(0, 0, 0) solid;
            box-shadow: outset 10px 50px 10px rgba(0, 0, 0, 0.2);
            }
        .hey-thats-me {
            transform: rotateX(180deg);

        }
        h1 {
            text-decoration: wavy underline #ff5100;
            text-transform: togglecase;
        }
        h2{
            text-decoration:  overline crimson;
            text-transform: lowercase;
        }
        h3{
            text-decoration: line-through olivedrab;
            text-transform: capitalize;
        }
        h4{
            text-decoration: underline overline blue;
            text-transform: capitalize;
        }
        .p2 {
            font-size: 15px;
            line-height: 1;
            color: #000000;
            font-family: PAPYRUS, fantasy;
        }
        .p3 {
            font-size: 20px;
            line-height: 1.8;
            color: #ff0000;
            font-family: COMIC SANS MS, cursive;
        }
        
    </style>
</head>
<body>
    <h1>heres a comic</h1>
    <p class="p1"> uhh papyrus</p>
    <p class="p1">I BURNED THE WATER.</p>
    <p class="p2">SANS HOW DID YOU BURN THE WATER?</p>
    <p class="p1">uhh i dont know man it just CAUGHT on fire</p>
    <p class="p2">SANS OH MY GOD THE HOUSE IS ON FIRE!!!</p>
    <p class="p3">IM SORRY THAT I CANT COOK!</p>

    <div>hey thats me</div>
    <div class="hey-thats-me">hey thats me</div>

    <h1>youre</h1>
    <h2>my</h2>
    <h3>sun</h3>
    <h4>shine</h4>
</body>
</html>

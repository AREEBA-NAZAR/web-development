<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
  <form>
    <fieldset>
        <legend>Personal information</legend>
        <label>Full Name</label>
        <input type="text" id="fname" placeholder="Enter your name"><br>
        <label>email.</label>
        <input type="text" id="email" placeholder="Enter your e-mail"><br> 
        <label>email.</label>
        <input type="text" id="email" placeholder="Enter your e-mail"><br> 
        <label>contact</label>
        <input type="password" id="contact" placeholder="Enter your phone no"><br> 
        <label>birthdate</label>
        <input type="date" id="birthday" name="birthdate" placeholder="Enter your birthday"><br> 
        <label>favorite city</label><br>
        <input type="checkbox" id="city" value="U.P">U.P<br> 
        <input type="checkbox" id="CITY" value="A.P">A.P<br> 
        <label>gender</label><br>
        <input type="radio" id="gender" value="female">Female<br> 
        <input type="radio" id="gender" value="male">Male<br> 
        <label>choose your </label>
        <select name="cars" id="cars"> 
            <option value="bmw">BMW</option>
            <option value="NISSAN GT-R Nismo">NISSAN GT-R Nismo</option>
            <option value="mercedes AMG"> mercedes AMG</option>
        </select>
    </fieldset>
  </form>  
</body>
</html>

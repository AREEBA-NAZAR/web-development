<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>function declaration</title>
</head>
<body>
    <center>
    <h1 style="color:rgb(206, 67, 2)">function declaration</h1>
    </center>
    <script>
        var result=(function(a,b){
            return a*b;
        });
        document.write(result(7,8));
    </script>
</body>
</html>

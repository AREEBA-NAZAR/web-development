<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>methods in js</title>
</head>
<body>
    <h2>Methods in JavaScript</h2>
    <p>basic methods</p>
    <script>
        var str = "lorem impusem sit dolor amet";
        document.write(str.toUpperCase())
        document.write("<br>")
        document.write(str.toLowerCase())
         document.write("<br>")
        document.write(str.startsWith("lorem"))
         document.write("<br>")

         var str1 ="lorem impusem sit dolor amet";
         var patt = new RegExp("lorem");
         var res = patt.test(str1);
         document.write(res)

    </script>
</body>
</html>

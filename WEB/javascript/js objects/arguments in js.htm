<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>finding the largest number with the help of arguments</p>
    <p id="demo"></p>
    <script>
        function findmax(){
           var i;
           var max=0;
           for(i=0;i< arguments.length;i++){
               if(arguments[i]>max){
                   max=arguments[i];
               }
           }
           return max;
        }
        document.getElementById("demo").innerHTML= findmax(4,5,6);
    </script>
</body>
</html>

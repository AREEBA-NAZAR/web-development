<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>objects js</title>
</head>
<body>
    <h2>Objects in JavaScript</h2>
    <p> there are two different ways to accessobjects in JavaScript </p>

    <p>you can use .property or ["property"]</p>
    <p id="demo"></p>
    <script>
        // Create an object
        var person = {
            firstName: "John",
            lastName: "Doe",
            age: 30
        };

      // display some data from the object
      document.getElementById("demo").innerHTML = person.firstName + " is " + person.age + " years old.";
    </script>
</body>
</html>
